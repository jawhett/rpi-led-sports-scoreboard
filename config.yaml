# The following scenes will be displayed in the order specified. Will loop once complete.
scene_order:
  - nba_games
  - nba_fav_team_next_game
  - nba_standings
  - nfl_games
  - nfl_fav_team_next_game
  - nfl_standings
  - wnba_games
  - mlb_games
  - worldcup_games


# Note your favourite teams by league. Any number of teams can be specified.
favourite_teams:
  nhl:
    # - BOS # Example.
  pwhl:
    # - TOR # Example.
  nba:
    - PHX
    # - TOR # Example.
  wnba:
    # - TOR # Example.
  mlb:
    # - TOR # Example.
  nfl:
    # - NE # Example.
  worldcup:
    # - USA # Example.


# Note alt logos that should be used. Any number of teams can have an alt logo, but each team is limited to a single alt logo at a time.
alt_logos:
  nhl:
    # SJS: 1998 # Example.
  pwhl:
    # OTT: 'Red' # Example.
  nba:
    # UTA: 2004 # Example.
  wnba:
    # SEA: 2000 # Example.
  mlb:
    # ATL: 'Cap' # Example.
    # NYY: 'Cap' # Example.
  nfl:
    # NE: 'Retro' # Example.
  worldcup:
    # USA: 'Retro' # Example.


# Settings for each scene.
scene_settings:
  # Hockey - NHL, PWHL.
  nhl:
    games: # nhl_games scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 1.5
      game_display_duration: 3.0
      score_alerting:
        score_coloured: true
        score_fade_animation: true
      rollover:
        rollover_start_time_local: '07:00'
        show_completed_games_until_rollover_end_time: True
        rollover_end_time_local: '12:00'

    fav_team_next_game: # nhl_fav_team_next_game scene.
      transition: 'modern'
      display_duration: 3.0
      display_if_in_progress: True

    standings: # nhl_standings scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 1.5
      scroll:
        scroll_pause_duration: 1
        scroll_frame_duration: 0.075
      highlight_fav_teams: True
      colour_sidebar: True
      display_for:
        - wildcard
        # - conference
        # - division
        # - league

  pwhl:
    games: # pwhl_games scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 1.5
      game_display_duration: 3.0
      score_alerting:
        score_coloured: true
