# Brightness settings.
brightness:
  brightness_mode: 'auto' #'auto', 'static'.
  max_brightness: 100


# Hardware configuration details.
hardware_config:
  hardware_mapping: 'regular' # Adjust to match your hardware.
  gpio_slowdown: 4 # 0-4. Adjust as needed for your hardware.
  led_rgb_sequence: 'RBG' # Adjust if colors are swapped (e.g., 'RGB', 'RBG', 'GRB', 'BRG')
